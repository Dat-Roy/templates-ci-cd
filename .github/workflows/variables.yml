name: Distinguish the types of variables in GitHub Action

on: 
  push:
    branches: [main]
    paths:
      - ".github/workflows/variables.yml"
      

env:
  WORKFLOW_VARIABLE: file in YAML file

permissions:
  contents: write

jobs:
  check_variable: 
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check variable and save
        run: |
          mkdir -p outputs/
          echo ${WORKFLOW_VARIABLE} 
          echo ${{ vars.GLOBAL_VARIABLE }} 
          echo ${{ secrets.SENSITIVE_VARS }}
          echo ${WORKFLOW_VARIABLE} > outputs/variables.txt
          echo ${{ vars.GLOBAL_VARIABLE }} >> outputs/variables.txt
          echo ${{ secrets.SENSITIVE_VARS }} >> outputs/variables.txt
          nvidia-smi 2>/dev/null || true

      - name: Save to repository
        run: |
          git config user.name "runner"
          git config user.email "actions@github.com"
          git add outputs/
          git commit -m "Add file output"
          git push
