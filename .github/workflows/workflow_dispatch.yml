name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      build:
        description: Do you want to build?
        required: true
        default: 'no'
        type: choice
        options:
          - 'build'
          - 'skip'
      deploy:
        description: Do you want to deploy?
        required: true
        default: 'no'
        type: choice
        options:
          - 'deploy'
          - 'skip'
 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ inputs.build == 'build' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          mkdir dist
          echo "<h1>Hello Pages</h1>" > dist/index.html
          echo "<p>Pages created by Github Action</p>" >> dist/index.html
          echo "<p>Author: Roy Pham</p>" >> dist/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write 
    if: ${{ inputs.deploy == 'deploy'  }}
    steps:
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
